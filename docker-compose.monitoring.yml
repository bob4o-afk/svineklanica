# OPTIONAL monitoring overlay. Bring up alongside the app:
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
#
#  - cAdvisor + node-exporter  → container & host metrics
#  - Prometheus                → scrapes those metrics
#  - Grafana                   → dashboards (login with GRAFANA_ADMIN_*)
#  - Uptime Kuma               → uptime checks (point it at https://APP_DOMAIN/_health)
#
# App ERROR tracking (Laravel + React) goes to Sentry (set SENTRY_LARAVEL_DSN /
# VITE_SENTRY_DSN) — that's SaaS, not in this file. Security events (honeypot
# hits, blacklist bans) are logged to the `security` channel and show up here.

services:
  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:latest
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: https://${APP_DOMAIN:-localhost}/grafana
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - "8080"

  node-exporter:
    image: prom/node-exporter:latest
    restart: always
    expose:
      - "9100"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: always
    volumes:
      - kuma_data:/app/data
    ports:
      - "3001:3001"

volumes:
  prom_data:
  grafana_data:
  kuma_data:

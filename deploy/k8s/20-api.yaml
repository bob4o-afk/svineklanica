# API (Laravel). Replace OWNER/tag, or override via kustomization images.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: liberhack
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/liberhack-api:latest
          command: ["php", "artisan", "serve", "--host=0.0.0.0", "--port=8000"]
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /_health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /_health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: liberhack
spec:
  selector: { app: api }
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: liberhack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }

# For real scale, PREFER a managed Postgres (point DB_HOST at it and delete this).
# This StatefulSet is the self-hosted option.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: liberhack
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secrets }
          env:
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: app-config, key: DB_DATABASE } }
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: app-secrets, key: DB_USERNAME } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: app-secrets, key: DB_PASSWORD } }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: { requests: { storage: 5Gi } }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: liberhack
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432

# Serves the built SPA in the `prod` image (SPA fallback to index.html).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are content-addressed → safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The entry document and the PWA service-worker files must ALWAYS be
    # revalidated — otherwise the browser keeps serving a stale app shell and a
    # fresh deploy never reaches the user (the "deployed ok but old UI" bug).
    # `no-cache` = the browser may store it but MUST revalidate with the server
    # before using it, so a new release shows up on the next load.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # SPA routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

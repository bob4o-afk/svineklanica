<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <!--
      Dev-time CSP shim. The dangerous directives are locked down here; production sends the
      full, stricter policy (incl. frame-ancestors + tightened script-src) as real HTTP headers
      via Caddy/nginx in Phase 5. 'unsafe-inline' on script is required only by the Vite dev
      server preamble; on style it is required by Emotion's runtime <style> injection.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss: https://localhost:5173 http://localhost:5173; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>СВИНЕКЛАНИЦА — корупцията на показ</title>

    <!--
      Static SEO defaults — what crawlers that DON'T run JS (social link scrapers: Facebook,
      Telegram, Viber, X) read for the link preview. Per-route titles/descriptions are set at
      runtime by AppSeo (react-helmet). Leads with the hero line so the phrase
      "Парите са обществени. Прозрачността — не." surfaces the site.
    -->
    <meta
      name="description"
      content="Парите са обществени. Прозрачността — не. Автоматично откриваме съмнителни обществени поръчки и плащания в България и показваме къде отиват парите ти — с връзка към първоизточника за всяко твърдение."
    />
    <meta
      name="keywords"
      content="обществени поръчки, прозрачност, корупция, къде ми отиват парите, къде отиват парите, разходи на държавата, обществени средства, контрол на властта, България, Свинекланица"
    />

    <meta property="og:site_name" content="СВИНЕКЛАНИЦА" />
    <meta property="og:locale" content="bg_BG" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="СВИНЕКЛАНИЦА — корупцията на показ" />
    <meta
      property="og:description"
      content="Парите са обществени. Прозрачността — не. Откриваме съмнителните обществени поръчки и показваме къде отиват парите ти."
    />
    <meta property="og:image" content="/pwa-512x512.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="СВИНЕКЛАНИЦА — корупцията на показ" />

    <!-- Official social profiles (Instagram + GitHub). -->
    <meta property="og:see_also" content="https://www.instagram.com/borislav_milanov_/" />
    <meta property="og:see_also" content="https://github.com/BabyNejii/corruption-fucker" />
    <link rel="me" href="https://www.instagram.com/borislav_milanov_/" />
    <link rel="me" href="https://github.com/BabyNejii/corruption-fucker" />
  </head>
  <body>
    <!-- MUI + Tailwind both target #root (Tailwind `important: '#root'`). -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

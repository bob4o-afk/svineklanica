<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <!--
      Dev-time CSP shim. The dangerous directives are locked down here; production sends the
      full, stricter policy (incl. frame-ancestors + tightened script-src) as real HTTP headers
      via Caddy/nginx in Phase 5. 'unsafe-inline' on script is required only by the Vite dev
      server preamble; on style it is required by Emotion's runtime <style> injection.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>СВИНЕКЛАННИЦА — корупцията на показ</title>
  </head>
  <body>
    <!-- MUI + Tailwind both target #root (Tailwind `important: '#root'`). -->
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

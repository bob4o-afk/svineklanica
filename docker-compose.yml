# Local development stack. Build/runtime is Docker (see .claude/rules/devops.md).
# Layout (leha-style): the Laravel app is the repo ROOT (app/, modules/, config/);
# the React client lives in apps/web. Dockerfile (root) builds the API image;
# apps/web/Dockerfile builds the web image. `dev` targets bind-mount source.

services:
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      # Dev default: the React app runs as Vite ON THE HOST (`make web` / `pnpm --dir apps/web dev`).
      # Native host file-watching gives instant HMR, and `docker compose restart` never touches it
      # — the in-container Vite is ~30x slower to first paint on the Windows/macOS bind mount and
      # its file events don't reach the watcher. Caddy reaches the host server via
      # host.docker.internal. To use the container Vite instead: start it with
      # `docker compose --profile container-vite up -d web` and set WEB_UPSTREAM_HOST=web.
      WEB_UPSTREAM_HOST: ${WEB_UPSTREAM_HOST:-host.docker.internal}
    extra_hosts:
      # So `host.docker.internal` resolves from inside the proxy on Linux too (Docker Desktop
      # provides it automatically on Windows/macOS).
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    env_file: .env
    # RUN_INIT makes THIS container the initializer: composer install (if needed),
    # key:generate (if empty), then migrate — before `artisan serve` (entrypoint.sh).
    environment:
      RUN_INIT: "true"
    entrypoint: ["sh", "./docker/dev/entrypoint.sh"]
    volumes:
      - .:/var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    build:
      context: .
      target: dev
    restart: unless-stopped
    env_file: .env
    # No RUN_INIT: the worker only waits for the app container's deps, never migrates.
    entrypoint: ["sh", "./docker/dev/entrypoint.sh"]
    volumes:
      - .:/var/www/html
    command: php artisan queue:work --tries=3 --backoff=5
    depends_on:
      - app
      - redis

  scheduler:
    build:
      context: .
      target: dev
    restart: unless-stopped
    env_file: .env
    entrypoint: ["sh", "./docker/dev/entrypoint.sh"]
    volumes:
      - .:/var/www/html
    command: php artisan schedule:work
    depends_on:
      - app

  # In-container Vite — OPT-IN only (profile "container-vite"). Default dev runs Vite on the host
  # (see the `proxy` service notes) because the bind-mounted container Vite is ~30x slower to
  # first paint on Windows/macOS and needs CPU-burning polling for HMR. Start explicitly with:
  #   docker compose --profile container-vite up -d web   (and set WEB_UPSTREAM_HOST=web)
  web:
    profiles: ["container-vite"]
    build:
      context: ./apps/web
      target: dev
    restart: unless-stopped
    env_file: ./apps/web/.env
    environment:
      # HMR over https://localhost via Caddy (wss on :443) → matches the canonical dev URL.
      # Flip to "true" only if you browse the direct http://localhost:5173 entry instead.
      # (One entry at a time — the two HMR modes are mutually exclusive.)
      VITE_HMR_DIRECT: "false"
      # Docker Desktop on Windows doesn't forward host file-change events into the container, so
      # without polling Vite never sees edits and HMR never fires ("nothing changes" on save).
      # Polling restores live reload; the gentle interval (vite.config.ts) keeps it responsive.
      VITE_USE_POLLING: "true"
    volumes:
      - ./apps/web:/app
      # Named (not anonymous) so Linux-built deps persist and `make install`
      # (a one-off `run` container) writes into the SAME volume the dev server uses.
      - web_node_modules:/app/node_modules
    # `pnpm install` on every start syncs the named node_modules volume to
    # package.json — so a newly added dep (e.g. a font) is always present and
    # Vite never fails with "Failed to resolve import". Then start the dev server.
    command: sh -c "pnpm install && pnpm dev --host 0.0.0.0 --port 5173"
    expose:
      - "5173"
    # Canonical dev URL is https://localhost (the Caddy proxy). Trust Caddy's local root
    # CA once (caddy-local-root.crt → Windows user "Root" store) and it becomes a trusted
    # secure context: MSW + the PWA service worker register and HMR runs over wss through
    # Caddy (see apps/web/vite.config.ts `server.hmr`).
    # 5173 is still published for direct http://localhost:5173 dev — also a secure context —
    # but native HMR there needs VITE_HMR_DIRECT=true on this service (one entry per server).
    ports:
      - "5173:5173"

  db:
    # pgvector-enabled Postgres 16 (backend.md §12 — vector search + detectors).
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-liberhack}
      POSTGRES_USER: ${DB_USERNAME:-liberhack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-liberhack}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # Local email capture — open http://localhost:8025 to read sent mail.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
    expose:
      - "1025"

  # Python scraping layer (apps/scraper). On-demand only (profile "scrape"), so
  # `make up` doesn't start it. Run a scrape with:
  #   docker compose run --rm scraper uv run scrape --source ted
  # It writes the NDJSON ingest contract into ./storage/ingest (shared with the
  # `app` container); Laravel then runs `php artisan ingest:run --source=ted`.
  scraper:
    build:
      context: ./apps/scraper
    profiles: ["scrape"]
    env_file: ./apps/scraper/.env
    volumes:
      - ./apps/scraper:/app
      - ./storage/ingest:/data/ingest

  # Python AI corruption-detector (apps/ai). On-demand only (profile "ai").
  # Reads the scraper's normalized NDJSON, scores corruption risk with LangChain
  # + Gemini, and writes a verdict sidecar into ./storage/ingest/verdicts that
  # Laravel ingests. Build context is ./apps so the editable procurement-scraper
  # path dependency (../scraper) resolves. Trigger an analysis with:
  #   docker compose run --rm ai uv run analyze --source ted
  ai:
    build:
      context: ./apps
      dockerfile: ai/Dockerfile
    profiles: ["ai"]
    env_file: ./apps/ai/.env
    volumes:
      - ./apps:/app
      - ./storage/ingest:/data/ingest

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
  web_node_modules:

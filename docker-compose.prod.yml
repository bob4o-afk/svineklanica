# PRODUCTION overlay — PULLS prebuilt images from the registry (no build here).
# CI (release.yml) builds + pushes images on a vX.Y.Z tag; the VM pulls + runs.
#
#   docker compose --env-file .env.prod -f docker-compose.prod.yml pull
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#   docker compose --env-file .env.prod -f docker-compose.prod.yml exec app php artisan migrate --force
#
# ALL prod config lives in ONE file: .env.prod (local dev uses .env). `--env-file
# .env.prod` makes it the source for BOTH the ${...} interpolation below
# (REGISTRY_OWNER, IMAGE_TAG, APP_DOMAIN, DB_*) AND, via `env_file:`, the app
# container's runtime env. db/redis are NOT exposed to the host (internal only).

services:
  proxy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_UPSTREAM_HOST: app
      API_UPSTREAM_PORT: "8000"
      WEB_UPSTREAM_HOST: web
      WEB_UPSTREAM_PORT: "80"   # prod web image is nginx on :80
      # Whole-site blacklist gate (security.md §3): when "true", Caddy forward_auths
      # a banned caller to a 403 for the ENTIRE page, not just /api. Off by default
      # (and unset in dev) so a page load never depends on the API being up.
      PAGE_GATE_ENABLED: ${PAGE_GATE_ENABLED:-false}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/caddy/error.html:/srv/caddy-errors/error.html:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - web

  app:
    image: ${REGISTRY:-ghcr.io}/${REGISTRY_OWNER}/svineklanitsa-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env.prod
    # No command override: the FrankenPHP image's own CMD serves the app on :8000.
    # Shared ingest handoff: the scraper/ai tools write NDJSON + verdicts here and
    # `php artisan ingest:run` reads them (the prod analogue of the local bind mount).
    volumes:
      - ingest_data:/app/storage/ingest
    expose:
      - "8000"
    # The rolling deploy waits for this to go healthy before draining the old
    # container — so a broken release never replaces a working one (zero-downtime).
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/_health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  queue:
    image: ${REGISTRY:-ghcr.io}/${REGISTRY_OWNER}/svineklanitsa-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env.prod
    command: php artisan queue:work --tries=3 --backoff=5
    # The async ingest job (ingest:run --queue) runs here, so it needs the handoff dir.
    volumes:
      - ingest_data:/app/storage/ingest
    # This worker runs queue:work, NOT the FrankenPHP web server — so the image's
    # baked :8000/_health check can never pass and would mark it permanently
    # "unhealthy". A queue worker has no HTTP surface to probe; disable the check.
    healthcheck:
      disable: true
    depends_on:
      - app
      - redis

  scheduler:
    image: ${REGISTRY:-ghcr.io}/${REGISTRY_OWNER}/svineklanitsa-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: .env.prod
    command: php artisan schedule:work
    volumes:
      - ingest_data:/app/storage/ingest
    # schedule:work is a long-running ticker, not the web server — same reason as
    # the queue worker: the baked :8000/_health check can't pass here. Disable it.
    healthcheck:
      disable: true
    depends_on:
      - app

  web:
    image: ${REGISTRY:-ghcr.io}/${REGISTRY_OWNER}/svineklanitsa-web:${IMAGE_TAG:-latest}
    restart: always
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    # pgvector-enabled Postgres 16 (backend.md §12 — vector search + detectors).
    # For real scale, swap for a managed Postgres that has the pgvector extension.
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  # --- On-demand Python batch tools (NOT daemons) ----------------------------
  # Pulled from GHCR like the rest (built+pushed by release.yml). They are NOT
  # started by `up -d` (profile "tools"); run them out-of-band against the shared
  # ingest volume, then ingest the result. Ingest-first — never live in a demo.
  #   docker compose --env-file .env.prod -f docker-compose.prod.yml --profile tools \
  #     run --rm scraper uv run scrape --source ted
  #   docker compose --env-file .env.prod -f docker-compose.prod.yml --profile tools \
  #     run --rm ai uv run analyze --source ted
  #   docker compose --env-file .env.prod -f docker-compose.prod.yml \
  #     exec app php artisan ingest:run --source=ted
  scraper:
    image: ${REGISTRY:-ghcr.io}/${REGISTRY_OWNER}/svineklanitsa-scraper:${IMAGE_TAG:-latest}
    profiles: ["tools"]
    restart: "no"
    env_file: .env.prod
    volumes:
      - ingest_data:/data/ingest

  ai:
    image: ${REGISTRY:-ghcr.io}/${REGISTRY_OWNER}/svineklanitsa-ai:${IMAGE_TAG:-latest}
    profiles: ["tools"]
    restart: "no"
    # GOOGLE_API_KEY + AGENTS_CAP + AGENTS_EVAL_CAP come from .env.prod.
    env_file: .env.prod
    volumes:
      - ingest_data:/data/ingest

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
  # Scraper/ai NDJSON + verdict handoff, shared with app/queue (read by ingest:run).
  ingest_data:

name: CI

# Tests on every push and PR (.claude/rules/devops.md §2). A red suite blocks merge.
# Layout: Laravel app at repo root; React client in apps/web.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend (Pest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: liberhack_test
          POSTGRES_USER: liberhack
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U liberhack"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql, intl, zip, bcmath, redis, pcntl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare app
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_DATABASE: liberhack_test
          DB_USERNAME: liberhack
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force

      - name: Lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_DATABASE: liberhack_test
          DB_USERNAME: liberhack
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: php artisan test

  frontend:
    name: Frontend (typecheck · lint · vitest · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test --run

      - name: Build (proves the PWA builds)
        run: pnpm build

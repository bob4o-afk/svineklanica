name: CI

# Tests on every push and PR (.claude/rules/devops.md §2). A red suite blocks merge.
# Layout: Laravel app at repo root; React client in apps/web.
# `workflow_call` lets release.yml reuse this as its pre-ship test gate.
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

jobs:
  # The core code is built on-site during the hackathon (CLAUDE.md §2). Until the
  # Laravel app / pnpm lockfile are committed there is nothing to test, so each
  # language lane is gated on its scaffold existing. This is NOT a green-washing
  # skip of failing tests (devops.md §2): when the code is present the full suite
  # runs and a failure blocks merge; before then the job is neutral, not red.
  detect:
    name: Detect what's scaffolded
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend }}
      frontend: ${{ steps.check.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f artisan ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No artisan at repo root yet — skipping backend tests until the Laravel app is scaffolded."
          fi
          if [ -f apps/web/pnpm-lock.yaml ]; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No apps/web/pnpm-lock.yaml yet — skipping frontend tests until the lockfile is committed."
          fi

  backend:
    name: Backend (Pest)
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector image so migrations' `CREATE EXTENSION vector` succeeds (backend.md §12).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: liberhack_test
          POSTGRES_USER: liberhack
          POSTGRES_PASSWORD: secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U liberhack"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql, intl, zip, bcmath, redis, pcntl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare app
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_DATABASE: liberhack_test
          DB_USERNAME: liberhack
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force

      - name: Lint (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_DATABASE: liberhack_test
          DB_USERNAME: liberhack
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
        run: php artisan test

  frontend:
    name: Frontend (typecheck · lint · vitest · build)
    needs: detect
    if: needs.detect.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      # No `version` input: pnpm/action-setup@v4 reads the pinned
      # `packageManager: pnpm@9.x` from package.json. Setting both errors out.
      # The action runs at the repo root (working-directory only applies to `run:`
      # steps), and there's no root package.json — so point it at apps/web's.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: apps/web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --run

      - name: Build (proves the PWA builds)
        run: pnpm build

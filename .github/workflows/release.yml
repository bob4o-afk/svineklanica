name: Deploy

# On every push to `main`: run tests -> build & push images to GHCR (tagged by
# commit SHA + latest) -> deploy to the VM -> email the user. No git tags needed.
# (.claude/rules/devops.md §3 — adapted: push-to-main instead of vX.Y.Z tag.)
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Gate — tests must pass before we ship
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & push images (GHCR)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GHCR repository names must be lowercase; the owner ("BabyNejii") isn't.
      - name: Lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Images are tagged by the immutable commit SHA (what the VM pulls) AND
      # `latest` (convenience). The SHA tag is what makes the deploy deterministic:
      # the VM can never accidentally run a stale cached `latest`.
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          target: prod
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-api:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-api:latest

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          target: prod
          push: true
          build-args: |
            VITE_MUI_X_LICENSE_KEY=${{ secrets.VITE_MUI_X_LICENSE_KEY }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-web:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-web:latest

      # On-demand Python batch tools. Single-stage Dockerfiles (no `target`).
      # The scraper context is its own dir; the analyzer's context is ./apps so
      # its editable `../scraper` path dependency resolves (see apps/ai/Dockerfile).
      - name: Build & push Scraper image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/scraper
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-scraper:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-scraper:latest

      - name: Build & push AI analyzer image
        uses: docker/build-push-action@v6
        with:
          context: ./apps
          file: ./apps/ai/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-ai:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-ai:latest

  deploy:
    name: Deploy to VM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sync the infra files the VM runs `docker compose` against. The VM was
      # originally seeded by hand (DEPLOY.md), so without this its compose file
      # goes stale — e.g. it kept the pre-rename `liberhack-*` image names while
      # CI pushes `svineklanitsa-*`, so every pull 404'd and the OLD image stayed.
      # `.env.prod` (secrets, machine-specific) is deliberately NOT copied.
      - name: Sync compose + Caddyfile to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: SSH in, pull, migrate, ROLLING (zero-downtime) swap
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Make compose AND docker-rollout use the prod file + env for ${...} interpolation.
            export COMPOSE_FILE=docker-compose.prod.yml
            export COMPOSE_ENV_FILES=.env.prod
            # The freshly built images are tagged by THIS commit's SHA — pull exactly that.
            TAG="${{ github.sha }}"

            # Install the docker-rollout CLI plugin on first run (scales a service up,
            # waits for the new container's healthcheck, then drains the old one).
            # Install into the dir THIS docker actually reads (DOCKER_CONFIG honored),
            # so the plugin is discoverable even when docker is invoked via sudo.
            PLUGIN_DIR="${DOCKER_CONFIG:-$HOME/.docker}/cli-plugins"
            if ! docker rollout --help >/dev/null 2>&1; then
              mkdir -p "$PLUGIN_DIR"
              curl -fsSL https://raw.githubusercontent.com/Wowu/docker-rollout/master/docker-rollout \
                -o "$PLUGIN_DIR/docker-rollout"
              chmod +x "$PLUGIN_DIR/docker-rollout"
            fi

            # Pin the stack to the freshly built commit SHA, then pull. (sed exits 0
            # even when it matches nothing, so we can't rely on `sed || echo` to add a
            # missing line — grep-then-write, so IMAGE_TAG is ALWAYS the exact SHA and
            # never silently falls back to the mutable `:latest`.)
            if grep -q '^IMAGE_TAG=' .env.prod; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${TAG}/" .env.prod
            else
              echo "IMAGE_TAG=${TAG}" >> .env.prod
            fi
            echo "Deploying IMAGE_TAG=${TAG}"

            # The pull MUST succeed — if it can't (e.g. GHCR package is private and this
            # VM isn't `docker login`'d to ghcr.io), `set -e` aborts here instead of
            # silently leaving the OLD image running. See DEPLOY.md §4.
            docker compose pull

            # Infra first; --wait BLOCKS until the Postgres healthcheck passes, so the
            # migration below doesn't race a still-starting DB ("connection refused").
            docker compose up -d --wait db redis

            # Migrate with the NEW image, before swapping the app in (keep migrations
            # backward-compatible so the old container still works during the overlap).
            docker compose run --rm --no-deps app php artisan migrate --force

            # Zero-downtime rolling swap of the web-facing services. Try `docker
            # rollout` when the service is already running; if the plugin is missing or
            # the roll fails for ANY reason (e.g. docker via sudo can't find the plugin,
            # "docker: unknown command: docker rollout"), `|| docker compose up -d`
            # recreates in place so the release NEVER dies on the swap — at the cost of
            # a brief restart blip. First deploy (service not yet running) → up -d too.
            for svc in app web; do
              if docker compose ps --status running --services | grep -qx "$svc"; then
                docker rollout "$svc" || docker compose up -d "$svc"
              else
                docker compose up -d "$svc"
              fi
            done

            # Background workers + edge proxy: recreate with the new image (no inbound
            # traffic hits the workers, and the proxy reload is graceful).
            docker compose up -d --no-deps queue scheduler proxy

            # Sanity check: the new app image must actually contain the code we expect.
            # `detect:run` is part of the Detection module — if this errors with
            # "no commands defined in the detect namespace", the VM is running an OLD
            # image (stale pull / wrong tag) and the deploy should be treated as failed.
            docker compose run --rm --no-deps app php artisan list detect >/dev/null

            # --- Fresh data on every release: scrape -> AI analyze -> ingest ---
            # Sources from repo variable SCRAPE_SOURCES (space/comma list; default
            # "ted"; set it to "off" to skip). The analyzer self-limits via the caps
            # in .env.prod (AGENTS_CAP concurrent, AGENTS_EVAL_CAP total evaluations).
            # Every step is NON-FATAL: a flaky upstream must not fail a good release.
            SOURCES="${{ vars.SCRAPE_SOURCES }}"
            [ -z "$SOURCES" ] && SOURCES="ted"
            if [ "$SOURCES" != "off" ] && [ "$SOURCES" != "none" ]; then
              docker compose --profile tools pull scraper ai || true
              for src in $(echo "$SOURCES" | tr ',' ' '); do
                echo "=== ingest pipeline: $src ==="
                docker compose --profile tools run --rm scraper uv run scrape --source "$src" \
                  || echo "scrape $src failed (continuing)"
                docker compose --profile tools run --rm ai uv run analyze --source "$src" \
                  || echo "analyze $src failed (continuing)"
                docker compose run --rm --no-deps app php artisan ingest:run --source="$src" \
                  || echo "ingest $src failed (continuing)"
              done
              # Recompute the red-flag detectors over the freshly ingested data.
              docker compose run --rm --no-deps app php artisan detect:run \
                || echo "detect:run failed (continuing)"
            else
              echo "SCRAPE_SOURCES=$SOURCES — skipping scrape/analyze on this deploy."
            fi

  # --- Email notifications: one when the deploy STARTS, one on SUCCESS,
  #     one on FAILURE (saying which stage failed). All via the same SMTP secrets.
  notify-start:
    name: Email — deploy started
    runs-on: ubuntu-latest
    steps:
      - name: Short SHA
        id: ver
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Normalize sender address
        id: from
        env:
          RAW_FROM: ${{ secrets.MAIL_FROM_ADDRESS }}
        run: |
          # Strip whitespace/newlines that sneak in when a secret is set via echo/pipe,
          # then 501-proof it: must be a single bare local@domain (no display name, no quotes).
          addr="$(printf '%s' "$RAW_FROM" | tr -d '[:space:]')"
          if ! printf '%s' "$addr" | grep -Eq '^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$'; then
            echo "::error::MAIL_FROM_ADDRESS is not a valid bare email (got a name, quotes, or whitespace?). Set it to e.g. watchdog@yourdomain.bg"
            exit 1
          fi
          echo "addr=$addr" >> "$GITHUB_OUTPUT"

      - name: Send "started" email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Свинекланица Watchdog <${{ steps.from.outputs.addr }}>
          to: ${{ secrets.RELEASE_NOTIFY_TO }}
          subject: "Свинекланица Watchdog — deploy ${{ steps.ver.outputs.sha }} STARTED ⏳"
          body: |
            A deploy of Свинекланица Watchdog (push to main) has started.

            Commit:  ${{ github.sha }}
            Branch:  ${{ github.ref_name }}
            Follow it: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  notify-success:
    name: Email — deploy succeeded
    needs: [test, build, deploy]
    if: ${{ always() && needs.test.result == 'success' && needs.build.result == 'success' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Short SHA
        id: ver
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build changelog for this push
        id: log
        run: |
          # The commits introduced by THIS push: github.event.before..github.sha.
          # Falls back to the last 10 commits on a first push / force-push (before = zeros).
          BEFORE="${{ github.event.before }}"
          {
            echo "changelog<<EOF"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              git log --pretty=format:'- %s (%h)' "$BEFORE..${{ github.sha }}"
            else
              git log --pretty=format:'- %s (%h)' -n 10 "${{ github.sha }}"
            fi
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Normalize sender address
        id: from
        env:
          RAW_FROM: ${{ secrets.MAIL_FROM_ADDRESS }}
        run: |
          addr="$(printf '%s' "$RAW_FROM" | tr -d '[:space:]')"
          if ! printf '%s' "$addr" | grep -Eq '^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$'; then
            echo "::error::MAIL_FROM_ADDRESS is not a valid bare email (got a name, quotes, or whitespace?). Set it to e.g. watchdog@yourdomain.bg"
            exit 1
          fi
          echo "addr=$addr" >> "$GITHUB_OUTPUT"

      - name: Send "success" email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Свинекланица Watchdog <${{ steps.from.outputs.addr }}>
          to: ${{ secrets.RELEASE_NOTIFY_TO }}
          subject: "Свинекланица Watchdog — deployed ${{ steps.ver.outputs.sha }} ✅"
          body: |
            A new version of Свинекланица Watchdog has shipped to the VM successfully.

            Commit:  ${{ github.sha }}
            Branch:  ${{ github.ref_name }}
            Run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Changes in this push:
            ${{ steps.log.outputs.changelog }}

  notify-failure:
    name: Email — deploy failed
    needs: [test, build, deploy]
    # Runs if ANY stage failed; reports which one.
    if: ${{ always() && (needs.test.result == 'failure' || needs.build.result == 'failure' || needs.deploy.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Short SHA
        id: ver
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Determine which stage failed
        id: which
        run: |
          F=""
          [ "${{ needs.test.result }}" = "failure" ] && F="$F tests"
          [ "${{ needs.build.result }}" = "failure" ] && F="$F build"
          [ "${{ needs.deploy.result }}" = "failure" ] && F="$F deploy"
          echo "stage=${F# }" >> "$GITHUB_OUTPUT"

      - name: Normalize sender address
        id: from
        env:
          RAW_FROM: ${{ secrets.MAIL_FROM_ADDRESS }}
        run: |
          addr="$(printf '%s' "$RAW_FROM" | tr -d '[:space:]')"
          if ! printf '%s' "$addr" | grep -Eq '^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$'; then
            echo "::error::MAIL_FROM_ADDRESS is not a valid bare email (got a name, quotes, or whitespace?). Set it to e.g. watchdog@yourdomain.bg"
            exit 1
          fi
          echo "addr=$addr" >> "$GITHUB_OUTPUT"

      - name: Send "failure" email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Свинекланица Watchdog <${{ steps.from.outputs.addr }}>
          to: ${{ secrets.RELEASE_NOTIFY_TO }}
          subject: "Свинекланица Watchdog — deploy ${{ steps.ver.outputs.sha }} FAILED ❌"
          body: |
            A deploy of Свинекланица Watchdog (push to main) FAILED.

            Commit:        ${{ github.sha }}
            Failed stage:  ${{ steps.which.outputs.stage }}
            Results:       tests=${{ needs.test.result }} build=${{ needs.build.result }} deploy=${{ needs.deploy.result }}
            Logs:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

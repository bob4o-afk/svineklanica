name: Deploy

# On every push to `main`: run tests -> build & push images to GHCR (tagged by
# commit SHA + latest) -> deploy to the VM -> email the user. No git tags needed.
# (.claude/rules/devops.md §3 — adapted: push-to-main instead of vX.Y.Z tag.)
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Gate — tests must pass before we ship
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & push images (GHCR)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GHCR repository names must be lowercase; the owner ("BabyNejii") isn't.
      - name: Lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Images are tagged by the immutable commit SHA (what the VM pulls) AND
      # `latest` (convenience). The SHA tag is what makes the deploy deterministic:
      # the VM can never accidentally run a stale cached `latest`.
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          target: prod
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-api:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-api:latest

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          target: prod
          push: true
          build-args: |
            VITE_MUI_X_LICENSE_KEY=${{ secrets.VITE_MUI_X_LICENSE_KEY }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-web:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-web:latest

      # On-demand Python batch tools. Single-stage Dockerfiles (no `target`).
      # The scraper context is its own dir; the analyzer's context is ./apps so
      # its editable `../scraper` path dependency resolves (see apps/ai/Dockerfile).
      - name: Build & push Scraper image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/scraper
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-scraper:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-scraper:latest

      - name: Build & push AI analyzer image
        uses: docker/build-push-action@v6
        with:
          context: ./apps
          file: ./apps/ai/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-ai:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/svineklanitsa-ai:latest

  deploy:
    name: Deploy to VM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sync the infra files the VM runs `docker compose` against. The VM was
      # originally seeded by hand (DEPLOY.md), so without this its compose file
      # goes stale — e.g. it kept the pre-rename `liberhack-*` image names while
      # CI pushes `svineklanitsa-*`, so every pull 404'd and the OLD image stayed.
      # `.env.prod` (secrets, machine-specific) is deliberately NOT copied.
      - name: Sync compose + Caddyfile to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # deploy/caddy/error.html is the styled error page the proxy mounts
          # (handle_errors / whole-site 403 gate, security.md §3) — nested path is
          # preserved under DEPLOY_PATH, matching the docker-compose.prod.yml mount.
          source: "docker-compose.prod.yml,Caddyfile,scripts/pipeline.sh,deploy/caddy/error.html"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: SSH in, pull, migrate, ROLLING (zero-downtime) swap
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Make compose AND docker-rollout use the prod file + env for ${...} interpolation.
            export COMPOSE_FILE=docker-compose.prod.yml
            export COMPOSE_ENV_FILES=.env.prod
            # The freshly built images are tagged by THIS commit's SHA — pull exactly that.
            TAG="${{ github.sha }}"

            # Install the docker-rollout CLI plugin on first run (scales a service up,
            # waits for the new container's healthcheck, then drains the old one).
            # Install into the dir THIS docker actually reads (DOCKER_CONFIG honored),
            # so the plugin is discoverable even when docker is invoked via sudo.
            PLUGIN_DIR="${DOCKER_CONFIG:-$HOME/.docker}/cli-plugins"
            if ! docker rollout --help >/dev/null 2>&1; then
              mkdir -p "$PLUGIN_DIR"
              curl -fsSL https://raw.githubusercontent.com/Wowu/docker-rollout/master/docker-rollout \
                -o "$PLUGIN_DIR/docker-rollout"
              chmod +x "$PLUGIN_DIR/docker-rollout"
            fi

            # Does rollout actually work now? (It can still be unavailable — e.g. docker
            # invoked via sudo can't see the plugin.) We use this to decide what a rollout
            # FAILURE means: "new container is unhealthy" (rollout works → gate, fail the
            # deploy) vs "no rollout available" (→ plain up -d, then the explicit health
            # gate below catches a broken image). Either way an unhealthy app never ships.
            ROLLOUT_OK=""
            docker rollout --help >/dev/null 2>&1 && ROLLOUT_OK=1

            # Pin the stack to the freshly built commit SHA, then pull. (sed exits 0
            # even when it matches nothing, so we can't rely on `sed || echo` to add a
            # missing line — grep-then-write, so IMAGE_TAG is ALWAYS the exact SHA and
            # never silently falls back to the mutable `:latest`.)
            if grep -q '^IMAGE_TAG=' .env.prod; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${TAG}/" .env.prod
            else
              echo "IMAGE_TAG=${TAG}" >> .env.prod
            fi
            echo "Deploying IMAGE_TAG=${TAG}"

            # The pull MUST succeed — if it can't (e.g. GHCR package is private and this
            # VM isn't `docker login`'d to ghcr.io), `set -e` aborts here instead of
            # silently leaving the OLD image running. See DEPLOY.md §4.
            docker compose pull

            # Infra first; --wait BLOCKS until the Postgres healthcheck passes, so the
            # migration below doesn't race a still-starting DB ("connection refused").
            docker compose up -d --wait db redis

            # Migrate with the NEW image, before swapping the app in (keep migrations
            # backward-compatible so the old container still works during the overlap).
            docker compose run --rm --no-deps app php artisan migrate --force

            # Zero-downtime rolling swap of the web-facing services. Try `docker
            # rollout` when the service is already running; if the plugin is missing or
            # the roll fails for ANY reason (e.g. docker via sudo can't find the plugin,
            # "docker: unknown command: docker rollout"), `|| docker compose up -d`
            # recreates in place so the release NEVER dies on the swap — at the cost of
            # a brief restart blip. First deploy (service not yet running) → up -d too.
            for svc in app web; do
              if [ -n "$ROLLOUT_OK" ] && docker compose ps --status running --services | grep -qx "$svc"; then
                # rollout WAITS for the new container's healthcheck before draining the
                # old one; if the new container never goes healthy it exits non-zero and
                # leaves the OLD one serving. We deliberately DON'T mask that with
                # `|| up -d` (that would promote a broken image) — `set -e` aborts the
                # deploy instead, and the working container keeps serving (no downtime).
                docker rollout "$svc"
              else
                # First deploy (nothing running yet) or rollout unavailable: recreate in
                # place, then the explicit health gate below catches a broken image.
                docker compose up -d "$svc"
              fi
            done

            # Background workers + edge proxy: recreate with the new image (no inbound
            # traffic hits the workers, and the proxy reload is graceful).
            docker compose up -d --no-deps queue scheduler proxy

            # --- HEALTH GATE: an unhealthy release must NEVER be declared a success.
            # This covers the `up -d` path (first deploy / rollout unavailable), which has
            # no built-in health wait. Poll each web-facing container's Docker healthcheck;
            # if app or web doesn't reach "healthy", abort (set -e + exit 1 → the deploy job
            # fails → notify-failure emails). Where rollout was used, the previous container
            # is left running, so a failed gate doesn't take the site down.
            echo "Health gate: waiting for app + web to report healthy..."
            for svc in app web; do
              cid="$(docker compose ps -q "$svc")"
              if [ -z "$cid" ]; then
                echo "::error::$svc has no container after swap — deploy aborted."
                exit 1
              fi
              ok=""
              for _ in $(seq 1 40); do
                status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$cid" 2>/dev/null || echo unknown)"
                [ "$status" = "healthy" ] && { ok=1; break; }
                sleep 3
              done
              if [ -z "$ok" ]; then
                echo "::error::$svc did not become healthy (last status: ${status:-unknown}) — deploy aborted."
                docker compose logs --tail=80 "$svc" || true
                exit 1
              fi
              echo "  $svc: healthy"
            done
            echo "Health gate passed."

            # Sanity check: the new app image must actually contain the code we expect.
            # `detect:run` is part of the Detection module — if this errors with
            # "no commands defined in the detect namespace", the VM is running an OLD
            # image (stale pull / wrong tag) and the deploy should be treated as failed.
            docker compose run --rm --no-deps app php artisan list detect >/dev/null

            # --- Fresh data on every deploy: scrape -> AI analyze -> ingest -> detect.
            # This is the SAME script cron runs hourly (scripts/pipeline.sh, scp'd above),
            # so the on-deploy refresh and the scheduled refresh are byte-for-byte identical.
            # It gates ingest on an AI verdict (--require-verdict) and self-limits via the
            # AGENTS_CAP/AGENTS_EVAL_CAP governors in .env.prod. Pull the tool images first,
            # then run; the whole thing is NON-FATAL so a flaky upstream can't fail a release.
            docker compose --profile tools pull scraper ai || true
            export SCRAPE_SOURCES="${{ vars.SCRAPE_SOURCES }}"
            bash scripts/pipeline.sh || echo "data pipeline failed (continuing — deploy still succeeds)"

            # --- Guarantee the HOURLY refresh cron is installed (idempotent).
            # Every deploy converges the schedule instead of relying on a manual
            # `crontab -e` (DEPLOY.md §6.1). We strip any prior pipeline.sh line and
            # re-add the canonical one, so re-deploys never duplicate it and a path
            # change is picked up. Runs at :05 hourly; cron stdout → a log in the
            # deploy dir (guaranteed writable by this user, unlike /var/log).
            # grep -v returns 1 when nothing matches, but echo is the subshell's last
            # command so it always exits 0 — `set -e` stays happy.
            # Self-heal: make sure a cron daemon is actually installed + running, so the
            # hourly schedule below can fire. Best-effort + fully non-fatal — run via `|| echo`
            # so `set -e` is suppressed inside the function (bash ignores -e in a tested
            # context); a VM without sudo or an unknown distro just keeps the on-deploy refresh.
            ensure_cron() {
              # Already have a working cron (client + an active daemon)? Nothing to do.
              if command -v crontab >/dev/null 2>&1 && \
                 { systemctl is-active --quiet cron 2>/dev/null || systemctl is-active --quiet crond 2>/dev/null \
                   || pgrep -x cron >/dev/null 2>&1 || pgrep -x crond >/dev/null 2>&1; }; then
                return 0
              fi
              SUDO=""; [ "$(id -u)" -ne 0 ] && command -v sudo >/dev/null 2>&1 && SUDO="sudo"
              if command -v apt-get >/dev/null 2>&1; then
                $SUDO apt-get update && $SUDO apt-get install -y cron && $SUDO systemctl enable --now cron
              elif command -v dnf >/dev/null 2>&1; then
                $SUDO dnf install -y cronie && $SUDO systemctl enable --now crond
              elif command -v yum >/dev/null 2>&1; then
                $SUDO yum install -y cronie && $SUDO systemctl enable --now crond
              else
                echo "no known package manager (apt-get/dnf/yum) to install cron"; return 1
              fi
            }
            ensure_cron || echo "WARNING: could not auto-install/enable a cron daemon (no sudo, or unknown distro). On-deploy refresh still ran; the hourly schedule may not fire — see DEPLOY.md §6.1."

            CRON_LINE="5 * * * * cd ${{ secrets.DEPLOY_PATH }} && /usr/bin/bash scripts/pipeline.sh >> ${{ secrets.DEPLOY_PATH }}/logs/pipeline-cron.log 2>&1"
            ( crontab -l 2>/dev/null | grep -vF 'scripts/pipeline.sh'; echo "$CRON_LINE" ) | crontab -
            # Verify the cron landed, but DON'T let grep's "no match -> exit 1" fail
            # the deploy: this is the LAST command under `set -e`, so its exit code is
            # the whole step's. The deploy + data refresh already succeeded — a missing
            # cron is a warning to investigate, not a release failure.
            if crontab -l 2>/dev/null | grep -F 'scripts/pipeline.sh'; then
              echo "Hourly pipeline cron ensured (shown above)."
            else
              echo "WARNING: could not confirm the hourly pipeline cron (crontab/cron unavailable on this VM, or not writable). Deploy still succeeded; install it manually per DEPLOY.md §6.1 if needed."
            fi

  # --- Email notifications: one when the deploy STARTS, one on SUCCESS,
  #     one on FAILURE (saying which stage failed). All via the same SMTP secrets.
  notify-start:
    name: Email — deploy started
    runs-on: ubuntu-latest
    steps:
      - name: Short SHA
        id: ver
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Normalize sender address
        id: from
        env:
          RAW_FROM: ${{ secrets.MAIL_FROM_ADDRESS }}
        run: |
          # Strip whitespace/newlines that sneak in when a secret is set via echo/pipe,
          # then 501-proof it: must be a single bare local@domain (no display name, no quotes).
          addr="$(printf '%s' "$RAW_FROM" | tr -d '[:space:]')"
          if ! printf '%s' "$addr" | grep -Eq '^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$'; then
            echo "::error::MAIL_FROM_ADDRESS is not a valid bare email (got a name, quotes, or whitespace?). Set it to e.g. watchdog@yourdomain.bg"
            exit 1
          fi
          echo "addr=$addr" >> "$GITHUB_OUTPUT"

      - name: Send "started" email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Свинекланица Watchdog <${{ steps.from.outputs.addr }}>
          to: ${{ secrets.RELEASE_NOTIFY_TO }}
          subject: "Свинекланица Watchdog — deploy ${{ steps.ver.outputs.sha }} STARTED ⏳"
          body: |
            A deploy of Свинекланица Watchdog (push to main) has started.

            Commit:  ${{ github.sha }}
            Branch:  ${{ github.ref_name }}
            Follow it: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  notify-success:
    name: Email — deploy succeeded
    needs: [test, build, deploy]
    if: ${{ always() && needs.test.result == 'success' && needs.build.result == 'success' && needs.deploy.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Short SHA
        id: ver
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build changelog for this push
        id: log
        run: |
          # The commits introduced by THIS push: github.event.before..github.sha.
          # Falls back to the last 10 commits on a first push / force-push (before = zeros).
          BEFORE="${{ github.event.before }}"
          {
            echo "changelog<<EOF"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              git log --pretty=format:'- %s (%h)' "$BEFORE..${{ github.sha }}"
            else
              git log --pretty=format:'- %s (%h)' -n 10 "${{ github.sha }}"
            fi
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Normalize sender address
        id: from
        env:
          RAW_FROM: ${{ secrets.MAIL_FROM_ADDRESS }}
        run: |
          addr="$(printf '%s' "$RAW_FROM" | tr -d '[:space:]')"
          if ! printf '%s' "$addr" | grep -Eq '^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$'; then
            echo "::error::MAIL_FROM_ADDRESS is not a valid bare email (got a name, quotes, or whitespace?). Set it to e.g. watchdog@yourdomain.bg"
            exit 1
          fi
          echo "addr=$addr" >> "$GITHUB_OUTPUT"

      - name: Send "success" email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Свинекланица Watchdog <${{ steps.from.outputs.addr }}>
          to: ${{ secrets.RELEASE_NOTIFY_TO }}
          subject: "Свинекланица Watchdog — deployed ${{ steps.ver.outputs.sha }} ✅"
          body: |
            A new version of Свинекланица Watchdog has shipped to the VM successfully.

            Commit:  ${{ github.sha }}
            Branch:  ${{ github.ref_name }}
            Run:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Changes in this push:
            ${{ steps.log.outputs.changelog }}

  notify-failure:
    name: Email — deploy failed
    needs: [test, build, deploy]
    # Runs if ANY stage failed; reports which one.
    if: ${{ always() && (needs.test.result == 'failure' || needs.build.result == 'failure' || needs.deploy.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Short SHA
        id: ver
        run: echo "sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Determine which stage failed
        id: which
        run: |
          F=""
          [ "${{ needs.test.result }}" = "failure" ] && F="$F tests"
          [ "${{ needs.build.result }}" = "failure" ] && F="$F build"
          [ "${{ needs.deploy.result }}" = "failure" ] && F="$F deploy"
          echo "stage=${F# }" >> "$GITHUB_OUTPUT"

      - name: Normalize sender address
        id: from
        env:
          RAW_FROM: ${{ secrets.MAIL_FROM_ADDRESS }}
        run: |
          addr="$(printf '%s' "$RAW_FROM" | tr -d '[:space:]')"
          if ! printf '%s' "$addr" | grep -Eq '^[^[:space:]@]+@[^[:space:]@]+\.[^[:space:]@]+$'; then
            echo "::error::MAIL_FROM_ADDRESS is not a valid bare email (got a name, quotes, or whitespace?). Set it to e.g. watchdog@yourdomain.bg"
            exit 1
          fi
          echo "addr=$addr" >> "$GITHUB_OUTPUT"

      - name: Send "failure" email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Свинекланица Watchdog <${{ steps.from.outputs.addr }}>
          to: ${{ secrets.RELEASE_NOTIFY_TO }}
          subject: "Свинекланица Watchdog — deploy ${{ steps.ver.outputs.sha }} FAILED ❌"
          body: |
            A deploy of Свинекланица Watchdog (push to main) FAILED.

            Commit:        ${{ github.sha }}
            Failed stage:  ${{ steps.which.outputs.stage }}
            Results:       tests=${{ needs.test.result }} build=${{ needs.build.result }} deploy=${{ needs.deploy.result }}
            Logs:          ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

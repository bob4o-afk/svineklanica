name: Release

# On a semver tag (vX.Y.Z): test -> build & push images to GHCR ->
# (optionally) deploy to the VM -> email the user. (.claude/rules/devops.md §3)
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Gate — tests must pass before we ship
    uses: ./.github/workflows/ci.yml

  build:
    name: Build & push images (GHCR)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GHCR repository names must be lowercase; the owner ("BabyNejii") isn't.
      - name: Lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          target: prod
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/liberhack-api:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER_LC }}/liberhack-api:latest

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          target: prod
          push: true
          build-args: |
            VITE_MUI_X_LICENSE_KEY=${{ secrets.VITE_MUI_X_LICENSE_KEY }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/liberhack-web:${{ github.ref_name }}
            ghcr.io/${{ env.OWNER_LC }}/liberhack-web:latest

  deploy:
    name: Deploy to VM (enable with repo variable DEPLOY_ENABLED=true)
    needs: build
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH in, pull, migrate, ROLLING (zero-downtime) swap
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Make compose AND docker-rollout use the prod file + env for ${...} interpolation.
            export COMPOSE_FILE=docker-compose.prod.yml
            export COMPOSE_ENV_FILES=.env.prod
            TAG="${{ github.ref_name }}"

            # Install the docker-rollout CLI plugin on first run (scales a service up,
            # waits for the new container's healthcheck, then drains the old one).
            if ! docker rollout --help >/dev/null 2>&1; then
              mkdir -p ~/.docker/cli-plugins
              curl -fsSL https://raw.githubusercontent.com/Wowu/docker-rollout/master/docker-rollout \
                -o ~/.docker/cli-plugins/docker-rollout
              chmod +x ~/.docker/cli-plugins/docker-rollout
            fi

            # Point the stack at the freshly built tag, then pull the images.
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${TAG}/" .env.prod || echo "IMAGE_TAG=${TAG}" >> .env.prod
            docker compose pull

            # Infra first (no-op if already running).
            docker compose up -d --no-deps db redis

            # Migrate with the NEW image, before swapping the app in (keep migrations
            # backward-compatible so the old container still works during the overlap).
            docker compose run --rm --no-deps app php artisan migrate --force

            # Zero-downtime rolling swap of the web-facing services. First deploy has
            # nothing to roll, so fall back to a plain up for those.
            for svc in app web; do
              if docker compose ps --status running --services | grep -qx "$svc"; then
                docker rollout "$svc"
              else
                docker compose up -d "$svc"
              fi
            done

            # Background workers + edge proxy: recreate with the new image (no inbound
            # traffic hits the workers, and the proxy reload is graceful).
            docker compose up -d --no-deps queue scheduler proxy

  notify:
    name: Email release notifier
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog since previous tag
        id: log
        run: |
          PREV=$(git describe --tags --abbrev=0 "${{ github.ref_name }}^" 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then RANGE="$PREV..${{ github.ref_name }}"; else RANGE="${{ github.ref_name }}"; fi
          {
            echo "changelog<<EOF"
            git log --pretty=format:'- %s (%h)' $RANGE
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send release email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: ${{ secrets.MAIL_FROM_ADDRESS }}
          to: ${{ secrets.RELEASE_NOTIFY_TO }}
          subject: "LiberHack Watchdog — released ${{ github.ref_name }}"
          body: |
            A new version of LiberHack Watchdog has shipped.

            Version: ${{ github.ref_name }}
            Images:  ghcr.io/${{ github.repository_owner }}/liberhack-api:${{ github.ref_name }}
                     ghcr.io/${{ github.repository_owner }}/liberhack-web:${{ github.ref_name }}
            Commit:  ${{ github.sha }}
            Build:   passed ✅

            Changes since the previous tag:
            ${{ steps.log.outputs.changelog }}
